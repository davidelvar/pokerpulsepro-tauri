<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="spadeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e5e5e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Inner subtle border/highlight -->
  <rect x="48" y="48" width="416" height="416" rx="80" ry="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  
  <!-- Spade symbol -->
  <g transform="translate(256, 280)">
    <!-- Main spade body -->
    <path d="M0,-160 
             C-20,-140 -120,-80 -120,20 
             C-120,80 -80,120 -40,120 
             C-10,120 10,100 0,60
             C-10,100 10,120 40,120 
             C80,120 120,80 120,20 
             C120,-80 20,-140 0,-160 Z" 
          fill="url(#spadeGrad)"/>
    <!-- Spade stem -->
    <path d="M-30,100 L-30,180 L30,180 L30,100 
             C20,120 -20,120 -30,100 Z" 
          fill="url(#spadeGrad)"/>
  </g>
</svg>
